<!DOCTYPE html><html><head>    <title>Fib Calculator</title>    <style>        body {            font-family: Arial, sans-serif;            text-align: center;            margin: 0;            padding: 0;        }        header {            border: 1px solid #333;            padding: 15px;            font-size: 24px;            margin-bottom: 30px;        }        input {            font-size: 20px;            width: 70px;            text-align: center;        }        button {            font-size: 20px;            margin-left: 10px;        }        h2 {            margin-top: 30px;        }        .result {            font-size: 22px;            margin: 10px;        }    </style></head><body><header>Fib Calculator</header><form method="POST" action="/calc">    <label>Enter your index:</label>    <input type="number" name="index" value="7" min="0">    <button type="submit">Submit</button></form><h2>Indices I have seen:</h2><div>    {{range $i, $r := .}}{{if $i}}, {{end}}{{$r.Index}}{{end}}</div><h2>Calculated Values:</h2><div>    {{range .}}    <div class="result">For index {{.Index}} I calculated {{.Value}}</div>    {{end}}</div></body></html>
