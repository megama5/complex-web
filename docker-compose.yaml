services:  postgres:    image: "postgres:latest"    ports:      - "5432:5432"    environment:      - POSTGRES_PASSWORD=postgres  redis:    image: "redis:latest"    ports:      - "6379:6379"  server:    build:      dockerfile: Dockerfile.dev      context: ./server    environment:      # redis      - REDIS_HOST=redis      - REDIS_PORT=6379      # postgres      - PG_HOST=postgres      - PG_PORT=5432      - PG_USER=postgres      - PG_PASS=postgres      - PG_DB=postgres    depends_on:      - redis      - postgres    ports:      - "3001:3001"  client:    build:      dockerfile: Dockerfile.dev      context: ./client    volumes:      - ./client/templates:/app/templates    ports:      - "80:80"    environment:      - SERVER_HOST=server      - SERVER_PORT=3001  worker:    build:      dockerfile: Dockerfile.dev      context: ./worker    environment:      # redis      - REDIS_HOST=redis      - REDIS_PORT=6379      # postgres      - PG_HOST=postgres      - PG_PORT=5432      - PG_USER=postgres      - PG_PASS=postgres      - PG_DB=postgres    depends_on:      - postgres      - redis